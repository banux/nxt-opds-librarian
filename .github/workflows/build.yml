name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out=dist/librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/librarian
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/librarian-${{ matrix.goos }}-${{ matrix.goarch }}
