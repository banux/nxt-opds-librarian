name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out=dist/librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          version="${GITHUB_REF_NAME}"
          [[ "$GITHUB_REF" == refs/tags/* ]] || version="${version}-$(git rev-parse --short HEAD)"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "$out" ./cmd/librarian
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/librarian-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  # Single release job so only ONE workflow run touches the release. Previously
  # the "Attach to release" step lived inside the build matrix, so all 4 legs
  # raced to create tag v0.39 via softprops/action-gh-release — the loser(s)
  # failed with "already_exists" and their binaries (e.g. linux-amd64) never
  # landed on the published release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: librarian-*
          merge-multiple: true

      - name: List binaries
        run: ls -la dist

      - name: Create release and attach binaries
        uses: softprops/action-gh-release@v3
        with:
          files: dist/librarian-*
          fail_on_unmatched_files: true
